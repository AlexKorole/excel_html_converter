<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title data-i18n="new_report_title">Новый отчёт</title>
  <link rel="stylesheet" href="/client/css/style.css">
</head>
<body>
<div class="container">
  <h1 data-i18n="new_report_title">Новый отчёт</h1>
  <p id="form-error" class="error-message" style="display:none;"></p>
  <form class="upload-form" id="new-report-form">
    <label data-i18n="report_name_label">Название отчёта</label>
    <input type="text" name="name" required>

    <label data-i18n="excel_file_label">Excel-файл (.xlsx)</label>
    <input type="file" name="file" accept=".xlsx" required>

    <label><input type="checkbox" name="include_connected" value="1">
      <span data-i18n="include_connected_label">Показывать таблицы, использующиеся как источник сводной</span></label>
    <br><br>

    <button class="btn btn-primary" type="submit" data-i18n="create_btn">Создать</button>
  </form>
  <p><a href="/" data-i18n="back_to_list">&larr; К списку отчётов</a></p>
</div>
<script src="/client/js/config.js"></script>
<script src="/client/js/i18n.js"></script>
<script src="/client/js/api.js"></script>
<script src="/client/js/new-report.js"></script>
</body>
</html>
